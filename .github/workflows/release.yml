name: Release

on:
  issue_comment:
    types: [created, deleted]
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  id-token: write
  pull-requests: write
  statuses: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Context check
    outputs:
      continue: ${{ steps.check.outputs.continue }}
      workflow: ${{ steps.check.outputs.workflow }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Context check
        id: check
        uses: TrigenSoftware/simple-release-action@v1
        with:
          workflow: check
          github-token: ${{ github.token }}
          branch: release
  pull-request:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Pull request
    needs: check
    if: needs.check.outputs.workflow == 'pull-request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Create or update pull request
        uses: TrigenSoftware/simple-release-action@v1
        with:
          workflow: pull-request
          github-token: ${{ github.token }}
          branch: release
      - name: Run CI and set status checks on release PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/release --jq '.object.sha')

          gh workflow run ci.yml --ref release
          sleep 5
          RUN_ID=$(gh run list --branch release --workflow ci.yml --limit 1 --json databaseId --jq '.[0].databaseId')
          echo "Waiting for CI run $RUN_ID..."
          gh run watch "$RUN_ID" --exit-status && STATUS=success || STATUS=failure

          for context in "Lint, Format & Typecheck" "Test (Bun 1.3.3)" "Test (Bun latest)"; do
            gh api repos/${{ github.repository }}/statuses/$HEAD_SHA \
              -f state="$STATUS" \
              -f context="$context" \
              -f description="CI $STATUS" \
              --silent
          done
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Release
    needs: check
    if: needs.check.outputs.workflow == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Validate
        run: bun run check && bun test
      - name: Release
        uses: TrigenSoftware/simple-release-action@v1
        with:
          workflow: release
          github-token: ${{ github.token }}
          branch: release
        env:
          NPM_CONFIG_PROVENANCE: "true"
