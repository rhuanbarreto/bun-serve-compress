name: Release

on:
  issue_comment:
    types: [created, deleted]
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  id-token: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Context check
    outputs:
      continue: ${{ steps.check.outputs.continue }}
      workflow: ${{ steps.check.outputs.workflow }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Context check
        id: check
        uses: TrigenSoftware/simple-release-action@v1
        with:
          workflow: check
          github-token: ${{ github.token }}
          branch: release
  pull-request:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Pull request
    needs: check
    if: needs.check.outputs.workflow == 'pull-request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Create or update pull request
        uses: TrigenSoftware/simple-release-action@v1
        with:
          workflow: pull-request
          github-token: ${{ github.token }}
          branch: release
      - name: Format and push release branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin release
          git checkout release
          bun run fmt
          if git diff --quiet; then
            echo "No formatting changes needed"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: format generated files"
            git push origin release
          fi
      - name: Trigger CI on release branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run ci.yml --ref release
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Release
    needs: check
    if: needs.check.outputs.workflow == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Validate
        run: bun run check && bun test
      - name: Release
        uses: TrigenSoftware/simple-release-action@v1
        with:
          workflow: release
          github-token: ${{ github.token }}
          branch: release
        env:
          NPM_CONFIG_PROVENANCE: "true"
